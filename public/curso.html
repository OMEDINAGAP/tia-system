<!DOCTYPE html>
<html>

<head>
  <title>Curso de Seguridad</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: auto;
    }

    .progress-bar {
      width: 100%;
      height: 12px;
      background: #1e293b;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 20px;
    }

    #progress-fill {
      height: 100%;
      width: 0%;
      background: #22c55e;
      transition: 0.3s;
    }

    .status {
      margin-top: 10px;
      font-weight: bold;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }

    .alert {
      margin-top: 20px;
      color: #f87171;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>🎥 Curso de Seguridad Aeroportuaria</h1>
    <p>Debes ver el video completo para continuar.</p>

    <div id="player"></div>

    <div class="progress-bar">
      <div id="progress-fill"></div>
    </div>

    <p id="progress">Progreso: 0%</p>
    <p id="status" class="status">Pendiente</p>

    <button id="btnExam" class="btn" disabled onclick="goExam()">
      Ir al examen
    </button>

    <div class="alert">
      ⚠️ No puedes adelantar ni cambiar de pestaña.
    </div>

  </div>

  <script src="https://www.youtube.com/iframe_api"></script>

  <script>

    // 🔐 TOKEN
    const token = localStorage.getItem("token");

    if (!token) {
      location.href = "/";
    }

    // 🛑 BLOQUEO CAMBIO DE PESTAÑA
    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        alert("No puedes salir del curso");
        location.reload();
      }
    });

    // 🎥 VARIABLES
    let player;
    let duration = 0;
    let maxTime = 0;

    // YOUTUBE READY
    function onYouTubeIframeAPIReady() {
      player = new YT.Player('player', {
        height: '400',
        width: '100%',
        videoId: 'mFnukhtcY2c',
        events: {
          'onReady': onReady
        }
      });
    }

    function onReady() {
      setInterval(track, 1000);
    }

    // TRACKING
    function track() {

      if (!player || typeof player.getCurrentTime !== "function") return;

      const current = player.getCurrentTime();

      if (!duration || duration === 0) {
        duration = player.getDuration();
        return;
      }

      // 🚫 NO ADELANTAR (con tolerancia real)
      if (current - maxTime > 5) {
        player.seekTo(maxTime);
      } else {
        maxTime = Math.max(maxTime, current);
      }

      const percent = (maxTime / duration) * 100;

      // UI
      document.getElementById("progress").innerText =
        "Progreso: " + Math.floor(percent) + "%";

      document.getElementById("progress-fill").style.width =
        percent + "%";

      // 📡 backend
      fetch("/log-video", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": token
        },
        body: JSON.stringify({
          progress: percent
        })
      });
    }
    // IR AL EXAMEN
    function goExam() {
      window.location.href = "/examen.html";
    }

  </script>

</body>

</html>
