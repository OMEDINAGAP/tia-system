<!DOCTYPE html>
<html>
<head>
  <title>Curso de Seguridad</title>
  <link rel="stylesheet" href="styles.css">

  <style>
    .progress-bar {
      width: 100%;
      height: 10px;
      background: #ddd;
      border-radius: 5px;
      margin-top: 15px;
      overflow: hidden;
    }

    #progress-fill {
      height: 100%;
      width: 0%;
      background: #0a1f44;
      transition: 0.3s;
    }

    .status {
      margin-top: 10px;
      font-weight: bold;
    }

    .status.red { color: #ef4444; }
    .status.green { color: #22c55e; }

    button {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>🎥 Curso de Seguridad Aeroportuaria</h1>

  <p>Debes completar el video para continuar.</p>

  <!-- VIDEO -->
  <div id="player"></div>

  <!-- PROGRESO -->
  <div class="progress-bar">
    <div id="progress-fill"></div>
  </div>

  <p id="progress">Progreso: 0%</p>
  <p id="status" class="status red">Pendiente</p>

  <button id="btnExam" disabled onclick="goExam()">Ir al examen</button>

  <div class="alert">
    ⚠️ No puedes adelantar el video ni cambiar de pestaña.
  </div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

if(!localStorage.getItem("userId")){
  window.location.href = "/";
}

let player;
let duration = 0;
let maxTime = 0;
let active = true;
let lastUpdate = Date.now();

function onYouTubeIframeAPIReady() {
  player = new YT.Player('player', {
    height: '400',
    width: '100%',
    videoId: 'mFnukhtcY2c', // 👈 CAMBIA ESTO
    playerVars: {
      controls: 1,
      rel: 0,
      modestbranding: 1
    },
    events: {
      'onReady': onReady
    }
  });
}

function onReady() {
  duration = player.getDuration();
  setInterval(track, 1000);
}

// DETECTAR CAMBIO DE PESTAÑA
document.addEventListener("visibilitychange", () => {
  if(document.hidden){
    active = false;
  } else {
    active = true;
  }
});

function track(){

  if(!player || typeof player.getCurrentTime !== "function") return;

  const current = player.getCurrentTime();

  // BLOQUEO SI NO ESTÁ ACTIVO
  if(!active){
    player.pauseVideo();
    return;
  }

  // BLOQUEO ANTI ADELANTO
  if(current > maxTime + 2){
    player.seekTo(maxTime);
  } else {
    maxTime = current;
  }

  const percent = (maxTime / duration) * 100;

  // UI
  document.getElementById("progress").innerText =
    "Progreso: " + Math.floor(percent) + "%";

  document.getElementById("progress-fill").style.width =
    percent + "%";

  // REGISTRO TIEMPO REAL
  const userId = localStorage.getItem("userId");

  fetch("/log-video", {
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      userId,
      progress: percent,
      seconds: maxTime
    })
  });

  // COMPLETADO
  if(percent >= 90){
    document.getElementById("status").className = "status green";
    document.getElementById("status").innerText = "✔ Completado";

    document.getElementById("btnExam").disabled = false;

    // REDIRECCIÓN AUTOMÁTICA
    setTimeout(()=>{
      window.location.href = "/examen.html";
    }, 2000);

  } else {
    document.getElementById("status").className = "status red";
    document.getElementById("status").innerText = "En proceso";
  }

}

function goExam(){
  window.location.href = "/examen.html";
}

</script>

</body>
</html>
