<!DOCTYPE html>
<html>

<head>
  <title>Curso de Seguridad</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: auto;
    }

    .progress-bar {
      width: 100%;
      height: 12px;
      background: #1e293b;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 20px;
    }

    #progress-fill {
      height: 100%;
      width: 0%;
      background: #22c55e;
      transition: 0.3s;
    }

    .status {
      margin-top: 10px;
      font-weight: bold;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }

    .alert {
      margin-top: 20px;
      color: #f87171;
    }

    #blocker {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      cursor: default;
      z-index: 10;
    }

    body {
      user-select: none;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>🎥 Curso de Seguridad Aeroportuaria</h1>
    <p>Debes ver el video completo para continuar.</p>
    <div id="videoWrapper" style="position:relative;">
      <div id="player"></div>
      <div id="blocker"></div>
    </div>
    <button onclick="togglePlay()" class="btn">
      ▶ Reproducir / Pausar
    </button>
    <p id="status"></p>
    <div class="progress-bar">
      <div id="progress-fill"></div>
    </div>

    <p id="progress">Progreso: 0%</p>
    <p id="status" class="status">Pendiente</p>

    <button id="btnExam" class="btn" onclick="goExam()">
      Ir al examen
    </button>

    <div class="alert">
      ⚠️ No puedes adelantar ni cambiar de pestaña.
    </div>

    <button class="btn" style="background:#3b82f6;" onclick="goExamTest()">
      ⚡ Modo prueba (directo)
    </button>

  </div>

  <script src="https://www.youtube.com/iframe_api"></script>

  <script>

    // 🔐 TOKEN
    const token = localStorage.getItem("token");

    if (!token) {
      location.href = "/";
    }

    // 🎥 VIDEOS (ORDENADOS)
    const videos = [
      "qnpYpzOIN0c", // Video 1
      "DpYySq7KIo"   // Video 2
    ];

    let currentVideoIndex = 0;

    // 🎥 VARIABLES
    let player;
    let duration = 0;
    let maxTime = 0;
    let wasPlaying = false;

    // 🔒 CONTROL DE PESTAÑA
    document.addEventListener("visibilitychange", () => {



      if (!player || typeof player.getPlayerState !== "function") return;

      if (document.hidden) {
        if (player.getPlayerState() === YT.PlayerState.PLAYING) {
          wasPlaying = true;
          player.pauseVideo();
        }
        document.getElementById("status").innerText = "⏸ Video pausado";
      } else {
        if (wasPlaying) {
          player.playVideo();
          wasPlaying = false;
        }
      }

    });

    // 🎥 YOUTUBE READY
    function onYouTubeIframeAPIReady() {
      player = new YT.Player('player', {
        height: '400',
        width: '100%',
        videoId: videos[currentVideoIndex],
        playerVars: {
          controls: 0,       // ❌ quita controles
          disablekb: 1,      // ❌ bloquea teclado
          modestbranding: 1,
          rel: 0
        },
        events: {
          'onReady': onReady,
          'onStateChange': onStateChange
        }
      });
    }

    // ▶️ READY
    function onReady() {
      setInterval(track, 1000);
      updateStatus();
    }

    // 🔄 CAMBIO DE ESTADO (cuando termina video)
    function onStateChange(event) {

      if (event.data === YT.PlayerState.ENDED) {

        if (currentVideoIndex < videos.length - 1) {

          currentVideoIndex++;
          resetTracking();

          player.loadVideoById(videos[currentVideoIndex]);

          updateStatus();

        } else {

          document.getElementById("status").innerText = "✅ Curso completado";
          document.getElementById("btnExam").disabled = false;

        }
      }
    }

    // 🔁 RESET ENTRE VIDEOS
    function resetTracking() {
      duration = 0;
      maxTime = 0;
    }

    // 📊 TRACKING
    function track() {

      if (!player || typeof player.getCurrentTime !== "function") return;

      const current = player.getCurrentTime();

      if (!duration || duration === 0) {
        duration = player.getDuration();
        return;
      }

      // 🚫 NO ADELANTAR
      if (current - maxTime > 5) {
        player.seekTo(maxTime);
      } else {
        maxTime = Math.max(maxTime, current);
      }

      const percentCurrentVideo = (maxTime / duration);

      // 🔥 PROGRESO TOTAL
      const totalProgress =
        ((currentVideoIndex + percentCurrentVideo) / videos.length) * 100;

      // UI
      document.getElementById("progress").innerText =
        "Progreso total: " + Math.floor(totalProgress) + "%";

      document.getElementById("progress-fill").style.width =
        totalProgress + "%";

      // 📡 backend
      fetch("/log-video", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify({
          progress: totalProgress
        })
      });

    }

    // 🧠 STATUS UX
    function updateStatus() {
      document.getElementById("status").innerText =
        `🎥 Video ${currentVideoIndex + 1} de ${videos.length}`;
    }

    // 🚀 IR AL EXAMEN (VALIDADO)
    async function goExam() {

      const res = await fetch("/can-take-exam", {
        headers: {
          Authorization: "Bearer " + token
        }
      });

      const data = await res.json();

      if (data.ok) {
        window.location.href = "/examen.html";
      } else {
        const progress = isNaN(data.progress) ? 0 : Math.floor(data.progress);
        alert(`Debes completar al menos el 90% del curso.\nProgreso actual: ${progress}%`);
      }
    }

    // ⚡ MODO PRUEBA
    function goExamTest() {
      localStorage.setItem("testMode", "true");
      window.location.href = "/examen.html";
    }


    function togglePlay() {
      const state = player.getPlayerState();

      if (state === YT.PlayerState.PLAYING) {
        player.pauseVideo();
      } else {
        player.playVideo();
      }
    }

    document.addEventListener("contextmenu", e => e.preventDefault());


    document.addEventListener("click", function (e) {
      if (e.target.closest("a")) {
        e.preventDefault();
      }
    });

  </script>

</html>
