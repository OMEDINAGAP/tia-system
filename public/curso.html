<!DOCTYPE html>
<html>

<head>
  <title>Curso de Seguridad</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    .subtitle {
      color: #94a3b8;
      margin-bottom: 20px;
    }

    /* CARD */
    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    }

    /* VIDEO */
    #videoWrapper {
      position: relative;
      margin-bottom: 15px;
    }

    #blocker {
      position: absolute;
      inset: 0;
      z-index: 10;
    }

    /* PROGRESS */
    .progress-bar {
      width: 100%;
      height: 10px;
      background: #334155;
      border-radius: 10px;
      margin-top: 10px;
      overflow: hidden;
    }

    #progress-fill {
      height: 100%;
      width: 0%;
      background: #22c55e;
      transition: 0.3s;
    }

    /* STATUS */
    .status {
      margin-top: 10px;
      font-weight: bold;
    }

    /* BOTONES */
    .btn-primary {
      background: #2563eb;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      margin-top: 10px;
    }

    .btn-success {
      background: #22c55e;
      border: none;
      padding: 12px;
      border-radius: 8px;
      color: white;
      width: 100%;
      margin-bottom: 10px;
      cursor: pointer;
    }

    .btn-secondary {
      background: #3b82f6;
      border: none;
      padding: 10px;
      border-radius: 8px;
      color: white;
      width: 100%;
      cursor: pointer;
    }

    /* ALERT */
    .alert {
      margin-top: 15px;
      color: #f87171;
      font-size: 14px;
    }

    /* BACK */
    .btn-back {
      background: #020617;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    .btn-back:hover {
      background: #334155;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>🎥 Curso de Seguridad Aeroportuaria</h1>
    <p class="subtitle">Debes ver los videos completos para continuar.</p>

    <!-- 🎥 CARD VIDEO -->
    <div class="card">

      <div id="videoWrapper">
        <div id="player"></div>
        <div id="blocker"></div>
      </div>

      <button onclick="togglePlay()" class="btn-primary">
        ▶ Reproducir / Pausar
      </button>

      <p id="status" class="status">Pendiente</p>

      <div class="progress-bar">
        <div id="progress-fill"></div>
      </div>

      <p id="progress">Progreso total: 0%</p>

    </div>

    <!-- 📊 CARD ACCIONES -->
    <div class="card actions">

      <button id="btnExam" class="btn-success" onclick="goExam()">
        Ir al examen
      </button>

      <button class="btn-secondary" onclick="goExamTest()">
        ⚡ Modo prueba
      </button>

      <div class="alert">
        ⚠️ No puedes adelantar ni cambiar de pestaña.
      </div>

    </div>

    <!-- 🔙 REGRESAR -->
    <button class="btn-back" onclick="goBack()">← Regresar</button>

  </div>

</body>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

  // 🔐 TOKEN
  const token = sessionStorage.getItem("token");


  if (!token) {
    alert("Sesión expirada");
    window.location.href = "/";
  }

  // 🎥 VIDEOS (ORDENADOS)
  const videos = [
    "qnpYpzOIN0c",
    "YDpYySq7KIo"
  ];

  let currentVideoIndex = 0;

  // 🎥 VARIABLES
  let player;
  let duration = 0;
  let maxTime = 0;
  let wasPlaying = false;
  let lastSent = 0; // 🔥 ESTA FALTABA
  let videoProgressMap = {};
  let allowTracking = false;

  // 🔒 CONTROL DE PESTAÑA
  document.addEventListener("visibilitychange", () => {



    if (!player || typeof player.getPlayerState !== "function") return;

    if (document.hidden) {
      if (player.getPlayerState() === YT.PlayerState.PLAYING) {
        wasPlaying = true;
        player.pauseVideo();
      }
      document.getElementById("status").innerText = "⏸ Video pausado";
    } else {
      if (wasPlaying) {
        player.playVideo();
        wasPlaying = false;
      }
    }

  });

  // 🎥 YOUTUBE READY
  function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
      height: '400',
      width: '100%',
      videoId: videos[currentVideoIndex],
      playerVars: {
        controls: 0,       // ❌ quita controles
        disablekb: 1,      // ❌ bloquea teclado
        modestbranding: 1,
        rel: 0
      },
      events: {
        'onReady': onReady,
        'onStateChange': onStateChange
      }
    });
  }

  async function onReady() {

    player.unMute();
    player.setVolume(100);

    // 🔥 cargar progreso
    setTimeout(() => {
      loadProgress();
    }, 1000);

    setInterval(track, 5000);
    updateStatus();
  }

  async function loadProgress() {
    try {

      const res = await fetch("/video-progress", {
        headers: {
          "Authorization": "Bearer " + token
        }
      });

      if (!res.ok) {
        console.error("ERROR:", res.status);
        return;
      }

      const data = await res.json();

      console.log("PROGRESO RECIBIDO:", data);

      videoProgressMap = {};
      let lastVideoIndex = 0;

      data.forEach(row => {

        videoProgressMap[row.videoIndex] = {
          progress: row.progress,
          completed: row.completed
        };

        if (!row.completed) {
          lastVideoIndex = row.videoIndex;
        } else {
          lastVideoIndex = Math.max(lastVideoIndex, row.videoIndex);
        }
      });

      console.log("MAPA FINAL:", videoProgressMap);

      currentVideoIndex = lastVideoIndex;

      // 🔥 RESET DEL SEEK (IMPORTANTE)
      window._seekDone = false;

      player.loadVideoById(videos[currentVideoIndex]);

    } catch (err) {
      console.error("ERROR loadProgress:", err);
    }
  }

  // 🔄 CAMBIO DE ESTADO (cuando termina video)
  function onStateChange(event) {

    // 🔥 REANUDAR EN EL MOMENTO CORRECTO
    if (event.data === YT.PlayerState.PLAYING) {

      const saved = videoProgressMap[currentVideoIndex]?.progress || 0;

      if (!saved || saved <= 0) return;

      const d = player.getDuration();
      if (!d || d === 0) return;

      const savedTime = (saved / 100) * d;

      console.log("🎯 REANUDANDO EN:", savedTime);

      // 🔥 AQUÍ VA LO QUE ME PREGUNTAS
      if (!window._seekDone) {

        player.seekTo(savedTime, true);

        maxTime = savedTime;

        window._seekDone = true;

        // 🔥 DAR TIEMPO PARA QUE EL SEEK SE APLIQUE
        allowTracking = false;

        setTimeout(() => {
          allowTracking = true;
        }, 2000); // 2 segundos es perfecto
      }
    }

    // 🔥 CUANDO TERMINA EL VIDEO
    if (event.data === YT.PlayerState.ENDED) {

      window._seekDone = false;

      videoProgressMap[currentVideoIndex] = {
        completed: true,
        progress: 100
      };

      if (currentVideoIndex < videos.length - 1) {

        currentVideoIndex++;
        resetTracking();

        // 🔥 IMPORTANTE TAMBIÉN AQUÍ
        window._seekDone = false;

        player.loadVideoById(videos[currentVideoIndex]);
        updateStatus();

      } else {

        document.getElementById("status").innerText = "✅ Curso completado";
        document.getElementById("btnExam").disabled = false;
      }
    }
  }


  function resetTracking() {
    duration = 0;
    maxTime = 0;
    lastSent = 0; // 🔥 ESTE ES EL QUE TE FALTABA
  }


  function track() {

    if (!player || typeof player.getCurrentTime !== "function") return;

    const state = player.getPlayerState();
    if (state !== YT.PlayerState.PLAYING) return;

    const current = player.getCurrentTime();

    // 🔥 asegurar duración válida
    if (!duration || duration === 0) {
      duration = player.getDuration();
      if (!duration || duration === 0) return;
    }

    // 🚫 BLOQUEO ANTI-SKIP
    if (!allowTracking) return;

    if (current > maxTime + 8) {
      player.seekTo(Math.max(0, maxTime - 1));
    } else {
      maxTime = Math.max(maxTime, current);
    }

    // 🎯 PROGRESO REAL DEL VIDEO (0–100)
    /*  const percentCurrentVideo = Math.min(
       100,
       Math.max(0, (maxTime / duration) * 100)
     ); */
    const percentCurrentVideo = (maxTime / duration) * 100;
    // 🎯 PROGRESO REAL DEL VIDEO (0–100)


    // 📊 PROGRESO TOTAL (solo UI)
    /*   const totalProgress =
        ((currentVideoIndex + (percentCurrentVideo / 100)) / videos.length) * 100; */

    // 📊 PROGRESO TOTAL (solo UI)
    const totalProgress = (
      (currentVideoIndex * 100 + percentCurrentVideo)
      / (videos.length * 100)
    ) * 100;

    console.log("TRACK:", {
      video: currentVideoIndex,
      percentVideo: percentCurrentVideo.toFixed(2),
      total: totalProgress.toFixed(2),
      lastSent
    });

    // 🔥 UI
    document.getElementById("progress-fill").style.width = totalProgress + "%";
    document.getElementById("progress").innerText =
      "Progreso total: " + Math.floor(totalProgress) + "%";



    // 🚀 ENVÍO CONTROLADO (SOLO POR VIDEO, NO TOTAL)
    if (percentCurrentVideo - lastSent >= 5) {

      lastSent = percentCurrentVideo;

      fetch("/log-video", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify({
          progress: percentCurrentVideo,   // ✅ porcentaje correcto
          videoIndex: currentVideoIndex
        })


      })
        .then(res => res.json())
        .then(data => console.log("💾 guardado:", data))
        .catch(err => console.error("❌ error log-video:", err));
    }
  }

  // 🧠 STATUS UX
  function updateStatus() {

    let statusText = `🎥 Video ${currentVideoIndex + 1} de ${videos.length}`;

    if (videoProgressMap[currentVideoIndex]?.completed) {
      statusText += " ✔ Completado";
    }

    document.getElementById("status").innerText = statusText;
  }

  // 🚀 IR AL EXAMEN (VALIDADO)
  async function goExam() {

    const res = await fetch("/can-take-exam", {
      headers: {
        Authorization: "Bearer " + token
      }
    });

    const data = await res.json();

    if (data.ok) {
      window.location.href = "/examen.html";
    } else {
      const progress = isNaN(data.progress) ? 0 : Math.floor(data.progress);
      alert(`Debes completar al menos el 90% del curso.\nProgreso actual: ${progress}%`);
    }
  }

  // ⚡ MODO PRUEBA
  function goExamTest() {
    sessionStorage.setItem("testMode", "true");

    setTimeout(() => {
      window.location.href = "/examen.html";
    }, 100);
  }


  function togglePlay() {
    const state = player.getPlayerState();

    if (state === YT.PlayerState.PLAYING) {
      player.pauseVideo();
    } else {
      player.playVideo();
    }
  }

  document.addEventListener("contextmenu", e => e.preventDefault());


  document.addEventListener("click", function (e) {
    if (e.target.closest("a")) {
      e.preventDefault();
    }
  });

</script>

<script>
  function goBack() {

    const path = window.location.pathname;

    if (path.includes("certificado")) {
      window.location.href = "/examen.html";

    } else if (path.includes("examen")) {
      window.location.href = "/curso.html";

    } else if (path.includes("curso")) {
      window.location.href = "/portal.html";

    } else if (path.includes("documentos")) {
      window.location.href = "/portal.html";

    } else if (path.includes("portal")) {
      window.location.href = "/";

    } else {
      window.history.back(); // fallback
    }
  }
</script>

</html>
