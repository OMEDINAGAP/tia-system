    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .container {
      background: #1e293b;
      border-radius: 16px;
      padding: 30px;
      width: 360px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .tabs {
      display: flex;
      margin-bottom: 20px;
      border-radius: 10px;
      overflow: hidden;
    }

    .tab {
      flex: 1;
      padding: 10px;
      cursor: pointer;
      background: #020617;
      text-align: center;
    }

    .tab.active {
      background: #22c55e;
    }

    .form {
      display: none;
    }

    .form.active {
      display: block;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    .footer {
      margin-top: 15px;
      font-size: 12px;
      opacity: 0.6;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="container">

    <h2>✈️ Sistema TIA</h2>

    <!-- 🔘 TABS -->
    <div class="tabs">
      <div class="tab active" onclick="switchTab(0)">Nuevo</div>
      <div class="tab" onclick="switchTab(1)">Seguimiento</div>
    </div>

    <!-- 🆕 NUEVO -->
    <div class="form active" id="formNew">

      <input id="name" placeholder="Nombre completo">
      <input id="company" placeholder="Empresa">
      <input id="pass" type="password" placeholder="Contraseña del día">

      <button onclick="loginNew()">Iniciar / Registrarse</button>

    </div>

    <!-- 🔁 EXISTENTE -->
    <div class="form" id="formOld">

      <input id="userId" placeholder="ID o Folio (ej. TIA-123456)">
      <input id="pass2" type="password" placeholder="Contraseña del día">

      <button onclick="loginById()">Ingresar</button>

    </div>

    <div class="footer">
      Sistema de Capacitación Aeroportuaria
    </div>

  </div>

  <script>

    function switchTab(index) {

      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".form").forEach(f => f.classList.remove("active"));

      document.querySelectorAll(".tab")[index].classList.add("active");
      document.querySelectorAll(".form")[index].classList.add("active");
    }

    async function loginNew() {

      const name = document.getElementById("name").value.trim();
      const company = document.getElementById("company").value.trim();
      const pass = document.getElementById("pass").value.trim();

      if (!name || !company || !pass) {

        Swal.fire(
          "??",
          "Completa todos los campos",
          "warning"
        );

        return;
      }

      // ?? VALIDAR Y CREAR USUARIO
      const res = await fetch("/validate-new", {
        method: "POST",
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          name,
          company,
          pass
        })
      });

      const data = await res.json();

      if (data.ok) {

        // ? GUARDAR FOLIO ORIGINAL
        const folio = data.folio;

        // ?? CREAR SESIÓN
        await fetch("/log-login", {

          method: "POST",

          headers: {
            "Content-Type": "application/json"
          },

          body: JSON.stringify({
            name,
            company
          })

        })
          .then(res => res.json())
          .then(session => {

            // ? TOKEN
            sessionStorage.setItem(
              "token",
              session.token
            );

            // ?? MENSAJE
            Swal.fire({

              title: "? Registro exitoso",

              html: `
          Tu folio es:<br>
          <b>${folio}</b>
        `,

              confirmButtonText: "Continuar",

              background: "#0f172a",
              color: "#fff"

            }).then(() => {

              window.location.href = "/portal.html";

            });

          });

      }
    }


    async function loginById() {

      const id = document.getElementById("userId").value.trim();
      const pass = document.getElementById("pass2").value.trim();

      if (!id || !pass) {
        Swal.fire("⚠️", "Completa todos los campos", "warning");
        return;
      }

      try {

        // 🔐 validar usuario
        const res = await fetch("/validate-id", {
          method: "POST",
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id, pass })
        });

        const data = await res.json();

        if (!data.ok) {
          Swal.fire("❌", "Acceso inválido", "error");
          return;
        }

        const userData = data.user;

        // 🔥 CREAR SESIÓN (AQUÍ ESTÁ LA CLAVE)
        const u = await fetch("/log-login", {
          method: "POST",
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: userData.name,
            company: userData.company
          })
        });


        const session = await u.json();

        if (!session.token) {
          Swal.fire("❌", "Error creando sesión", "error");
          return;
        }

        // 🔐 guardar token
        sessionStorage.setItem("token", session.token);

        // opcional
        sessionStorage.setItem("userId", userData.id);



        // 🚀 entrar
        window.location.href = "/portal.html";

      } catch (err) {
        console.error(err);
        Swal.fire("❌", "Error de conexión", "error");
      }
    }
  </script>
