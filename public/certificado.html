<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Certificado TIA</title>

  <!-- BOOTSTRAP -->

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- HTML2PDF -->

  <script src="https://cdn.jsdelivr.net/npm/html2pdf.js"></script>

  <style>

    body {

      background:
        linear-gradient(
          135deg,
          #dbe4f0,
          #eef2f7
        );

      min-height: 100vh;

      display: flex;

      justify-content: center;

      align-items: center;

      padding: 40px;

      font-family: Georgia, serif;
    }

    /* CERTIFICADO */

    .cert {

      width: 1100px;

      min-height: 780px;

      background: white;

      border: 10px solid #173b7a;

      position: relative;

      overflow: hidden;

      box-shadow:
        0 15px 40px rgba(0,0,0,.20);

      padding: 70px 90px;

      text-align: center;
    }

    /* BORDE INTERNO */

    .cert::before {

      content: "";

      position: absolute;

      inset: 15px;

      border: 2px solid #d4af37;

      pointer-events: none;
    }

    /* LOGO */

    .logo {

      font-size: 20px;

      font-weight: bold;

      letter-spacing: 1px;

      color: #111;

      margin-bottom: 25px;
    }

    /* TITULO */

    .title {

      color: #173b7a;

      font-size: 52px;

      font-weight: bold;

      letter-spacing: 2px;

      margin-bottom: 50px;

      text-transform: uppercase;
    }

    /* TEXTO */

    .subtitle {

      font-size: 24px;

      color: #333;
    }

    /* NOMBRE */

    .nombre {

      font-size: 54px;

      font-weight: bold;

      color: #111;

      margin-top: 30px;

      margin-bottom: 15px;

      text-transform: uppercase;
    }

    /* EMPRESA */

    .empresa {

      font-size: 24px;

      color: #444;

      margin-bottom: 50px;
    }

    /* DESCRIPCION */

    .descripcion {

      font-size: 30px;

      line-height: 1.8;

      color: #222;

      width: 80%;

      margin: auto;
    }

    .curso {

      font-weight: bold;

      color: #173b7a;
    }

    /* DATOS */

    .datos {

      margin-top: 60px;

      font-size: 24px;

      line-height: 2;
    }

    .datos b {

      color: #173b7a;
    }

    /* QR */

    .qr-box {

      margin-top: 50px;
    }

    #qr {

      width: 170px;

      height: 170px;

      object-fit: contain;

      background: white;

      padding: 10px;

      border-radius: 10px;

      border: 1px solid #ddd;
    }

    /* FOOTER */

    .footer {

      margin-top: 50px;

      font-size: 14px;

      color: #666;
    }

    /* BOTON */

    .btn-download {

      margin-top: 30px;

      padding:
        12px 30px;

      font-size: 18px;

      border-radius: 10px;
    }

  </style>

</head>

<body>

  <div>

    <!-- CERTIFICADO -->

    <div
      class="cert"
      id="cert"
    >

      <!-- LOGO -->

      <div class="logo">
        ✈️ AEROPUERTO INTERNACIONAL
      </div>

      <!-- TITULO -->

      <div class="title">
        Constancia de Acreditación
      </div>

      <!-- SUB -->

      <div class="subtitle">
        Se certifica que:
      </div>

      <!-- NOMBRE -->

      <div
        class="nombre"
        id="nombre"
      >
        ---
      </div>

      <!-- EMPRESA -->

      <div
        class="empresa"
        id="empresa"
      >
      </div>

      <!-- TEXTO -->

      <div class="descripcion">

        Ha completado satisfactoriamente el

        <span class="curso">
          CURSO DE SEGURIDAD AEROPORTUARIA
        </span>

        cumpliendo con los lineamientos
        de seguridad establecidos.

      </div>

      <!-- DATOS -->

      <div class="datos">

        <div>
          <b>Folio:</b>
          <span id="folio"></span>
        </div>

        <div>
          <b>Fecha:</b>
          <span id="fecha"></span>
        </div>

      </div>

      <!-- QR -->

      <div class="qr-box">

        <img id="qr" />

      </div>

      <!-- FOOTER -->

      <div class="footer">
        Documento válido únicamente con código QR verificable.
      </div>

    </div>

    <!-- BOTON -->

    <div class="text-center">

      <button
        onclick="descargar()"
        class="btn btn-primary btn-download"
      >
        Descargar PDF
      </button>

    </div>

  </div>

  <script>

    async function load() {

      const res = await fetch("/me", {

        headers: {

          Authorization:
            "Bearer " +
            sessionStorage.getItem("token")
        }
      });

      const user = await res.json();

      console.log("USER:", user);

      if (!user || !user.name) {

        alert("Error cargando certificado");

        return;
      }

      // NOMBRE

      document.getElementById("nombre").innerText =
        user.name || "---";

      // EMPRESA

      document.getElementById("empresa").innerText =
        user.company
          ? "Empresa: " + user.company
          : "";

      // FOLIO

      document.getElementById("folio").innerText =
        user.folio || "---";

      // FECHA

      if (user.fecha) {

        const fecha = new Date(user.fecha);

        document.getElementById("fecha").innerText =
          fecha.toLocaleDateString(
            "es-MX",
            {
              day: "numeric",
              month: "long",
              year: "numeric"
            }
          );

      } else {

        document.getElementById("fecha").innerText =
          "---";
      }

      // QR

      const qr =
        document.getElementById("qr");

      qr.onload = () => {

        console.log("✅ QR cargado");

        setTimeout(() => {

          descargar();

        }, 800);

      };

      qr.onerror = () => {

        console.log("❌ Error QR");

      };

      qr.src = user.qr || "";

    }

    function descargar() {

      const element =
        document.getElementById("cert");

      const opt = {

        margin: 0,

        filename:
          "Certificado-TIA.pdf",

        image: {
          type: "jpeg",
          quality: 1
        },

        html2canvas: {

          scale: 3,

          useCORS: true
        },

        jsPDF: {

          unit: "mm",

          format: "a4",

          orientation: "landscape"
        }
      };

      html2pdf()
        .set(opt)
        .from(element)
        .save();

    }

    load();

  </script>

</body>

</html>
