<!DOCTYPE html>
<html>

<head>
  <title>Examen TIA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
    }

    /* SIDEBAR */
    .sidebar {
      width: 220px;
      background: #020617;
      padding: 20px;
      height: 100vh;
    }

    .menu-item {
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      cursor: pointer;
    }

    .active {
      background: #22c55e;
    }

    /* MAIN */
    .main {
      flex: 1;
      padding: 30px;
    }

    .subtitle {
      color: #94a3b8;
    }

    /* CARD */
    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    }

    /* OPCIONES */
    .option {
      display: block;
      margin: 10px 0;
      padding: 12px;
      background: #020617;
      border-radius: 10px;
      cursor: pointer;
    }

    .option:hover {
      border: 1px solid #22c55e;
    }

    /* PROGRESS */
    .progress-bar {
      height: 10px;
      background: #334155;
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #22c55e;
      width: 0%;
    }

    /* BOTONES */
    .btn-success {
      background: #22c55e;
      border: none;
      padding: 12px;
      border-radius: 8px;
      color: white;
      width: 100%;
      cursor: pointer;
    }

    .btn-back {
      margin-top: 10px;
      background: #020617;
      border: none;
      padding: 10px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      width: 100%;
    }

    /* RIGHT PANEL */
    .right {
      width: 220px;
      padding: 20px;
    }

    .nav-box {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }

    .nav-box div {
      padding: 10px;
      background: #0f172a;
      text-align: center;
      border-radius: 6px;
      cursor: pointer;
    }

    .answered {
      background: #22c55e;
    }

    .current {
      border: 2px solid white;
    }
  </style>
</head>

<body>

  <div class="sidebar">
    <h2>✈️ TIA</h2>
    <div class="menu-item" onclick="goCurso()">Curso</div>
    <div class="menu-item active">Examen</div>
  </div>

  <div class="main">

    <h2>Examen de Seguridad</h2>
    <p class="subtitle">Responde todas las preguntas para continuar</p>

    <!-- 📊 CARD PROGRESO -->
    <div class="card">
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>
      <p id="progressText"></p>
    </div>

    <!-- ❓ CARD PREGUNTA -->
    <div id="questionBox" class="card"></div>

    <!-- 🎮 CARD ACCIONES -->
    <div class="card actions">
      <button class="btn-success" onclick="next()">Siguiente</button>
      <button class="btn-back" onclick="goBack()">← Regresar</button>
    </div>

  </div>

  <!-- 📍 CARD NAVEGACIÓN -->
  <div class="right">
    <div class="card">
      <h3>Navegación</h3>
      <div id="nav" class="nav-box"></div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem("token");

    let questions = [];
    let current = 0;
    let answers = [];

    // 🔥 Cargar preguntas desde backend
    async function loadExam() {

      const res = await fetch("/questions", {
        headers: { Authorization: token }
      });

      questions = await res.json();
      answers = new Array(questions.length).fill(null);

      render();
    }

    function render() {

      const q = questions[current];

      document.getElementById("questionBox").innerHTML = `
    <h3>${q.question}</h3>

    ${["A", "B", "C", "D"].map(letter => {
        const text = q["option_" + letter.toLowerCase()];
        if (!text) return "";
        return `
        <label class="option">
          <input type="radio" name="q" value="${letter}"
          ${answers[current] === letter ? "checked" : ""}>
          ${letter}) ${text}
        </label>
      `;
      }).join("")}
  `;

      const percent = ((current + 1) / questions.length) * 100;

      document.getElementById("progressFill").style.width = percent + "%";
      document.getElementById("progressText").innerText =
        `Pregunta ${current + 1} de ${questions.length}`;

      renderNav();
    }

    function renderNav() {

      const nav = document.getElementById("nav");
      nav.innerHTML = "";

      questions.forEach((_, i) => {

        const div = document.createElement("div");
        div.innerText = i + 1;

        if (answers[i]) div.classList.add("answered");
        if (i === current) div.classList.add("current");

        div.onclick = () => {
          current = i;
          render();
        };

        nav.appendChild(div);
      });
    }

    function next() {

      const selected = document.querySelector("input[name='q']:checked");

      if (!selected) {
        alert("Selecciona una respuesta");
        return;
      }

      answers[current] = selected.value;

      if (current < questions.length - 1) {
        current++;
        render();
      } else {
        finish();
      }
    }

    // 🔥 Enviar al backend
    async function finish() {

      const payload = questions.map((q, i) => ({
        id: q.id,
        answer: answers[i]
      }));

      const res = await fetch("/submit-exam", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": token
        },
        body: JSON.stringify({ answers: payload })
      });

      const data = await res.json();

      document.body.innerHTML = `
    <h1>Resultado: ${data.score}%</h1>
    <button onclick="location.href='/certificado.html'">Ver certificado</button>
  `;
    }

    loadExam();

    async function validateAccess() {

      const token = localStorage.getItem("token");
      const isTest = localStorage.getItem("testMode") === "true";

      const res = await fetch("/can-take-exam", {
        headers: {
          Authorization: "Bearer " + token,
          ...(isTest && { "x-test-mode": "true" }) // 🔥 clave
        }
      });

      const data = await res.json();

      if (!data.ok) {
        alert("No tienes acceso al examen");
        window.location.href = "/curso.html";
      }
    }

    validateAccess();

    function goCurso() {
      window.location.href = "/curso.html";
    }


  </script>

</body>

</html>
