<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Examen TIA</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #020617, #0f172a);
      color: white;
      display: flex;
    }

    /* SIDEBAR */
    .sidebar {
      width: 250px;
      background: #020617;
      padding: 20px;
      height: 100vh;
    }

    .menu-item {
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      cursor: pointer;
    }

    .active {
      background: #22c55e;
    }

    /* MAIN */
    .main {
      flex: 1;
      padding: 30px;
    }

    .card {
      background: #1e293b;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .option {
      display: block;
      margin: 10px 0;
      padding: 12px;
      border-radius: 10px;
      background: #0f172a;
      cursor: pointer;
      border: 1px solid transparent;
    }

    .option:hover {
      border: 1px solid #22c55e;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }

    .progress-bar {
      height: 10px;
      background: #0f172a;
      border-radius: 10px;
      margin: 10px 0;
    }

    .progress-fill {
      height: 100%;
      background: #22c55e;
      width: 0%;
      border-radius: 10px;
    }

    /* RIGHT PANEL */
    .right {
      width: 200px;
      padding: 20px;
    }

    .nav-box {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 5px;
    }

    .nav-box div {
      padding: 10px;
      text-align: center;
      background: #1e293b;
      border-radius: 6px;
      cursor: pointer;
    }

    .answered {
      background: #22c55e;
    }

    .current {
      border: 2px solid white;
    }
  </style>
</head>

<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>✈️ TIA</h2>

    <div class="menu-item">Curso</div>
    <div class="menu-item active">Examen</div>
    <div class="menu-item">Certificado</div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <h2>Examen de Seguridad</h2>

    <div class="progress-bar">
      <div id="progressFill" class="progress-fill"></div>
    </div>

    <p id="progressText"></p>

    <div id="questionBox" class="card"></div>

    <button class="btn" onclick="next()">Siguiente</button>

  </div>

  <!-- RIGHT PANEL -->
  <div class="right">
    <h3>Navegación</h3>
    <div id="nav" class="nav-box"></div>
  </div>

  <script>

    const questionBanks = [

      [
        {
          q: "¿QUE SIGNIFICA TIA?",
          options: [
            "Tarjeta para instalaciones aeroportuarias",
            "Tarjeta de información aérea",
            "Tarjeta de identificación aeroportuaria"
          ],
          correct: 2
        },
        {
          q: "¿CUAL ES EL OBJETIVO DEL PLAN DE SEGURIDAD?",
          options: [
            "Conocer el aeropuerto",
            "Prevenir actos de interferencia ilícita",
            "Seguridad a comercios",
            "Todas"
          ],
          correct: 1
        }
      ],

      [
        {
          q: "¿QUÉ ES SEGURIDAD?",
          options: [
            "Medidas y recursos para proteger aviación",
            "Evitar pasajeros",
            "Leyes laborales"
          ],
          correct: 0
        }
      ],

      [
        {
          q: "¿QUE ES UN ACTO DE INTERFERENCIA ILICITA?",
          options: [
            "Operación normal",
            "Reglas de abordaje",
            "Actos que comprometen seguridad"
          ],
          correct: 2
        }
      ]

    ];

    function shuffle(arr) {
      return arr.sort(() => Math.random() - 0.5);
    }

    const exam = shuffle(questionBanks[Math.floor(Math.random() * questionBanks.length)]);

    let current = 0;
    let answers = new Array(exam.length).fill(null);

    // render nav
    function renderNav() {
      const nav = document.getElementById("nav");
      nav.innerHTML = "";

      exam.forEach((_, i) => {
        const div = document.createElement("div");
        div.innerText = i + 1;

        if (answers[i] !== null) div.classList.add("answered");
        if (i === current) div.classList.add("current");

        div.onclick = () => {
          current = i;
          render();
        };

        nav.appendChild(div);
      });
    }

    // render question
    function render() {

      const q = exam[current];

      document.getElementById("questionBox").innerHTML = `
    <h3>${q.q}</h3>

    ${shuffle(q.options.map((opt, i) => ({ opt, i }))).map(o => `
      <label class="option">
        <input type="radio" name="q" value="${o.i}"
        ${answers[current] === o.i ? "checked" : ""}>
        ${o.opt}
      </label>
    `).join("")}
  `;

      const percent = ((current + 1) / exam.length) * 100;

      document.getElementById("progressFill").style.width = percent + "%";
      document.getElementById("progressText").innerText =
        `Pregunta ${current + 1} de ${exam.length}`;

      renderNav();
    }

    // next
    function next() {

      const selected = document.querySelector("input[name='q']:checked");

      if (!selected) {
        alert("Selecciona una respuesta");
        return;
      }

      answers[current] = parseInt(selected.value);

      if (current < exam.length - 1) {
        current++;
        render();
      } else {
        finish();
      }
    }

    // finish
    function finish() {

      let correct = 0;

      exam.forEach((q, i) => {
        if (q.correct === answers[i]) correct++;
      });

      const score = Math.round((correct / exam.length) * 100);

      document.body.innerHTML = `
    <h1>Resultado: ${score}%</h1>
    <button onclick="location.href='/certificado.html'">Ver certificado</button>
  `;
    }

    // init
    render();
  </script>

</body>

</html>
