<!DOCTYPE html>
<html>
<head>
  <title>Examen TIA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      font-family: Arial;
      background:#0f172a;
      color:white;
      padding:20px;
    }

    .container{
      max-width:900px;
      margin:auto;
    }

    .question{
      background:#1e293b;
      padding:15px;
      border-radius:10px;
      margin-bottom:15px;
    }

    button{
      padding:12px 20px;
      border:none;
      border-radius:10px;
      background:#22c55e;
      color:white;
      cursor:pointer;
      margin-top:20px;
    }

    #resultado{
      margin-top:20px;
      font-size:20px;
      font-weight:bold;
    }

    .qr{
      margin-top:20px;
      width:150px;
    }
  </style>
</head>

<body>

<div class="container">

<h1>🧠 Evaluación de Seguridad Aeroportuaria</h1>
<p>Responde correctamente todas las preguntas.</p>

<form id="quiz"></form>

<button id="btnEnviar" onclick="calificar()">Finalizar examen</button>

<div id="resultado"></div>
<img id="qr" class="qr" style="display:none;">

<br>
<button id="btnCert" style="display:none;" onclick="verCert()">Ver certificado</button>

</div>

<script>

// 🔐 TOKEN
const token = localStorage.getItem("token");

if(!token){
  location.href = "/";
}

// 🔒 VALIDAR ACCESO
async function validar(){

  const res = await fetch("/me", {
    headers:{ Authorization: token }
  });

  if(res.status !== 200){
    location.href = "/";
    return;
  }

  const user = await res.json();

  if(user.video < 90){
    alert("Debes completar el curso");
    location.href = "/curso.html";
  }

}

validar();


// 🧠 PREGUNTAS
const preguntas = [
{q:"¿Qué significa TIA?",o:["Tarjeta para Instalaciones Aeroportuarias","Tarjeta de Información Aérea","Tarjeta de Identificación Aeroportuaria"],a:2},
{q:"Objetivo del plan de seguridad:",o:["Conocer aeropuerto","Prevenir actos ilícitos","Seguridad comercio","Todas"],a:1},
{q:"Extravío de TIA:",o:["Reportar módulo TIAS","Ignorar","Seguridad privada"],a:0},
{q:"Zona restringida:",o:["TIA vigente","Autorizada","Revisión","Todas"],a:3},
{q:"Qué reportar:",o:["Persona sin TIA","Objeto abandonado","Vandalismo","Todas"],a:3},
{q:"Qué es seguridad:",o:["Medidas de protección","Evitar pasajeros","Ley laboral"],a:0},
{q:"Acto ilícito:",o:["Operación","Reglas","Compromete seguridad"],a:2},
{q:"Contingencia:",o:["Evacuar","Extintor","Prevenir"],a:2},
{q:"Nivel contingencia:",o:["Administrador","AFAC","Aerolínea"],a:0},
{q:"Amenaza:",o:["Aerolínea","Limpieza","Seguridad"],a:2},
{q:"Normas:",o:["Nacional e internacional","Municipal","Global"],a:0},
{q:"Áreas:",o:["Seguridad y operacional","Judicial","Laboral"],a:0},
{q:"TIAV:",o:["Aerovehicular","Aeroportuaria vehicular","Vehicular"],a:1},
{q:"Niveles:",o:["3","5","4"],a:0}
];

const form = document.getElementById("quiz");

// RENDER
preguntas.forEach((p,i)=>{
  let html = `<div class="question"><h3>${i+1}. ${p.q}</h3>`;
  p.o.forEach((op,j)=>{
    html += `<label>
      <input type="radio" name="q${i}" value="${j}"> ${op}
    </label><br>`;
  });
  html += "</div>";
  form.innerHTML += html;
});


// 🧠 CALIFICAR
let enviado = false;

async function calificar(){

  if(enviado) return;
  enviado = true;

  let score = 0;

  for(let i=0;i<preguntas.length;i++){
    const sel = document.querySelector(`input[name="q${i}"]:checked`);
    
    if(!sel){
      alert("Responde todas las preguntas");
      enviado = false;
      return;
    }

    if(Number(sel.value) === preguntas[i].a){
      score++;
    }
  }

  const porcentaje = Math.round((score / preguntas.length) * 100);

  document.getElementById("resultado").innerText =
    `Resultado: ${porcentaje}%`;

  // 📡 ENVIAR
  const res = await fetch("/log-exam", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization": token
    },
    body: JSON.stringify({
      score: porcentaje
    })
  });

  const data = await res.json();

  if(porcentaje >= 80){

    alert("Aprobado");

    // mostrar QR
    if(data.qr){
      const qr = document.getElementById("qr");
      qr.src = data.qr;
      qr.style.display = "block";
    }

    // botón certificado
    document.getElementById("btnCert").style.display = "inline-block";

  }else{
    alert("No aprobado");
  }

}


// 🎓 CERTIFICADO
function verCert(){
  window.location.href = "/certificado.html";
}

</script>

</body>
</html>
