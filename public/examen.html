<!DOCTYPE html>
<html>

<head>
  <title>Examen TIA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
    }

    /* SIDEBAR */
    .sidebar {
      width: 220px;
      background: #020617;
      padding: 20px;
      height: 100vh;
    }

    .menu-item {
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      cursor: pointer;
    }

    .active {
      background: #22c55e;
    }

    /* MAIN */
    .main {
      flex: 1;
      padding: 30px;
    }

    .subtitle {
      color: #94a3b8;
    }

    /* CARD */
    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    }

    /* OPCIONES */
    .option {
      display: block;
      margin: 10px 0;
      padding: 12px;
      background: #020617;
      border-radius: 10px;
      cursor: pointer;
    }

    .option:hover {
      border: 1px solid #22c55e;
    }

    /* PROGRESS */
    .progress-bar {
      height: 10px;
      background: #334155;
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #22c55e;
      width: 0%;
    }

    /* BOTONES */
    .btn-success {
      background: #22c55e;
      border: none;
      padding: 12px;
      border-radius: 8px;
      color: white;
      width: 100%;
      cursor: pointer;
    }

    .btn-back {
      margin-top: 10px;
      background: #020617;
      border: none;
      padding: 10px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      width: 100%;
    }

    /* RIGHT PANEL */
    .right {
      width: 220px;
      padding: 20px;
    }

    .nav-box {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }

    .nav-box div {
      padding: 10px;
      background: #0f172a;
      text-align: center;
      border-radius: 6px;
      cursor: pointer;
    }

    .answered {
      background: #22c55e;
    }

    .current {
      border: 2px solid white;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

  <div class="sidebar">
    <h2>✈️ TIA</h2>
    <div class="menu-item" onclick="goCurso()">Curso</div>
    <div class="menu-item active">Examen</div>
  </div>

  <div class="main">

    <h2>Examen de Seguridad</h2>
    <p class="subtitle">Responde todas las preguntas para continuar</p>

    <!-- 📊 CARD PROGRESO -->
    <div class="card">
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>
      <p id="progressText"></p>
    </div>

    <!-- ❓ CARD PREGUNTA -->
    <div id="questionBox" class="card"></div>

    <!-- 🎮 CARD ACCIONES -->
    <div class="card actions">
      <button class="btn-success" onclick="next()">Siguiente</button>
    </div>

  </div>

  <!-- 📍 CARD NAVEGACIÓN -->
  <div class="right">
    <div class="card">
      <h3>Navegación</h3>
      <div id="nav" class="nav-box"></div>
    </div>
  </div>

  <script>
    const token = sessionStorage.getItem("token");

    let questions = [];
    let current = 0;
    let answers = [];

    // 🔥 Cargar preguntas desde backend
    async function loadExam() {

      const res = await fetch("/questions", {
        headers: { Authorization: token }
      });

      questions = await res.json();
      answers = new Array(questions.length).fill(null);

      render();
    }

    function render() {

      const q = questions[current];

      document.getElementById("questionBox").innerHTML = `
    <h3>${q.question}</h3>

    ${["A", "B", "C", "D"].map(letter => {
        const text = q["option_" + letter.toLowerCase()];
        if (!text) return "";
        return `
        <label class="option">
          <input type="radio" name="q" value="${letter}"
          ${answers[current] === letter ? "checked" : ""}>
          ${letter}) ${text}
        </label>
      `;
      }).join("")}
  `;

      const percent = ((current + 1) / questions.length) * 100;

      document.getElementById("progressFill").style.width = percent + "%";
      document.getElementById("progressText").innerText =
        `Pregunta ${current + 1} de ${questions.length}`;

      renderNav();
    }

    function renderNav() {

      const nav = document.getElementById("nav");
      nav.innerHTML = "";

      questions.forEach((_, i) => {

        const div = document.createElement("div");
        div.innerText = i + 1;

        if (answers[i]) div.classList.add("answered");
        if (i === current) div.classList.add("current");

        div.onclick = () => {
          current = i;
          render();
        };

        nav.appendChild(div);
      });
    }

    function next() {

      const selected = document.querySelector("input[name='q']:checked");

      if (!selected) {
        Swal.fire({
          title: '✈️ TIA',
          html: '<b>Selecciona una respuesta antes de continuar</b>',
          icon: 'warning',
          confirmButtonText: 'Aceptar',
          background: '#0f172a',
          color: '#fff',
          confirmButtonColor: '#22c55e',
          backdrop: 'rgba(0,0,0,0.8)'
        });
        return;
      }

      answers[current] = selected.value;

      if (current < questions.length - 1) {
        current++;
        render();
      } else {
        finish();
      }
    }

    // 🔥 Enviar al backend
  async function finish() {

  let correct = 0;

  questions.forEach((q, index) => {

    const selected = answers[index];

    console.log(
      "Pregunta:",
      index,
      "Seleccionada:",
      selected,
      "Correcta:",
      q.correct
    );

    // 🔥 VALIDAR
    if (selected === q.correct) {
      correct++;
    }

  });

  const score = Math.round(
    (correct / questions.length) * 100
  );

  console.log("CORRECTAS:", correct);
  console.log("TOTAL:", questions.length);
  console.log("SCORE:", score);

  // 🚀 GUARDAR RESULTADO
  const res = await fetch("/submit-exam", {

    method: "POST",

    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },

    body: JSON.stringify({
      score
    })

  });

  const data = await res.json();

  console.log("SUBMIT:", data);

  // ✅ APROBADO
  if (score >= 80) {

    // 🔥 GENERAR CERTIFICADO
    await fetch("/log-exam", {

      method: "POST",

      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },

      body: JSON.stringify({
        score
      })

    });

    Swal.fire({

      icon: "success",

      title: "🎉 ¡Aprobaste!",

      html: `
        <div style="font-size:18px;">
          Obtuviste:
          <br><br>
          <b style="
            font-size:42px;
            color:#22c55e;
          ">
            ${score}%
          </b>
          <br><br>
          Excelente trabajo ✈️
        </div>
      `,

      confirmButtonText: "Ver certificado",

      background: "#0f172a",

      color: "#fff",

      confirmButtonColor: "#22c55e"

    }).then(() => {

      window.location.href =
        "/certificado.html";

    });

  }

  // ❌ REPROBADO
  else {

    Swal.fire({

      icon: "error",

      title: "❌ No aprobaste",

      html: `
        <div style="font-size:18px;">
          Obtuviste:
          <br><br>
          <b style="
            font-size:42px;
            color:#ef4444;
          ">
            ${score}%
          </b>
          <br><br>
          Necesitas mínimo 80%
        </div>
      `,

      background: "#0f172a",

      color: "#fff",

      confirmButtonColor: "#ef4444"

    });

  }

}



    loadExam();

    async function validateAccess() {

      const token = sessionStorage.getItem("token");
      const isTest = sessionStorage.getItem("testMode") === "true";

      const res = await fetch("/can-take-exam", {
        headers: {
          Authorization: "Bearer " + token,
          ...(isTest && { "x-test-mode": "true" }) // 🔥 clave
        }
      });

      const data = await res.json();

      if (!data.ok) {
        Swal.fire({
          title: '⚠️ Atención',
          text: 'No tienes acceso al examen',
          icon: 'warning',
          confirmButtonText: 'Entendido',
          background: '#1e293b',
          color: '#fff',
          confirmButtonColor: '#22c55e'
        });
        window.location.href = "/curso.html";
      }
    }

    validateAccess();

    function goCurso() {
      window.location.href = "/curso.html";
    }


  </script>

</body>

</html>
