<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Admin Login - TIA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .login-box {
      background: #1e293b;
      padding: 40px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
      background: #334155;
      color: white;
      font-size: 16px;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #16a34a;
    }

    .error {
      color: #ef4444;
      margin-top: 10px;
      font-size: 14px;
    }

    .loader {
      margin-top: 10px;
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <h2>🔐 Acceso Admin</h2>

    <input id="pin" type="password" placeholder="Ingresa tu PIN">

    <button onclick="loginAdmin()">Entrar</button>

    <div class="loader" id="loader"></div>
    <div class="error" id="error"></div>
  </div>

  <script>

    // 🔥 Si ya hay sesión → directo al admin
    const existingToken = sessionStorage.getItem("token");

    if (existingToken && existingToken.startsWith("admin-")) {
      window.location.href = "/admin.html";
    }

    async function loginAdmin(){

      const pin = document.getElementById("pin").value.trim();
      const error = document.getElementById("error");
      const loader = document.getElementById("loader");

      error.innerText = "";
      loader.innerText = "";

      if (!pin) {
        error.innerText = "Ingresa el PIN";
        return;
      }

      loader.innerText = "Validando...";

      try {

        const res = await fetch("/admin-login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ pin })
        });

        if (!res.ok) {
          throw new Error("Error de autenticación");
        }

        const data = await res.json();

        if (data.ok) {

          // 🔐 guardar sesión
          sessionStorage.setItem("token", data.token);

          // 🚀 redirigir
          window.location.href = "/admin.html";

        } else {
          error.innerText = "PIN incorrecto";
          loader.innerText = "";
        }

      } catch (err) {
        console.error(err);
        error.innerText = "Error del servidor";
        loader.innerText = "";
      }

    }

  </script>

</body>
</html>
