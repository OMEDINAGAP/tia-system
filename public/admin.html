<!DOCTYPE html>
<html>
<head>
<title>Admin TIA PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: Arial;
  background:#0b1220;
  color:white;
  padding:20px;
}

/* LOGIN */
.login{
  max-width:300px;
  margin:auto;
  margin-top:100px;
  text-align:center;
}

/* DASHBOARD */
.dashboard{
  display:none;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  border:none;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
  cursor:pointer;
  margin-top:5px;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  margin-top:20px;
}

.kpis{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.kpi{
  flex:1;
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

.table{
  width:100%;
  border-collapse: collapse;
}

.table th{
  background:#334155;
}

.table td, .table th{
  padding:10px;
}

.badge{
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
}

.ok{background:#16a34a;}
.fail{background:#dc2626;}

.qr{
  width:50px;
}

video{
  width:100%;
  max-width:350px;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
  <h2>🔐 Admin Login</h2>
  <input id="pin" placeholder="PIN">
  <button onclick="login()">Entrar</button>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

<h1>🛫 Panel TIA PRO</h1>

<div class="kpis">
  <div class="kpi">Usuarios<br><b id="total">0</b></div>
  <div class="kpi">Aprobados<br><b id="aprobados">0</b></div>
  <div class="kpi">Reprobados<br><b id="reprobados">0</b></div>
</div>

<input id="search" placeholder="Buscar..." onkeyup="render()">

<table class="table">
<thead>
<tr>
<th>Nombre</th>
<th>Video</th>
<th>Examen</th>
<th>Status</th>
<th>QR</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<!-- 🔍 VALIDAR POR IMAGEN -->
<div class="card">
<h2>📂 Validar QR (imagen)</h2>
<input type="file" id="qrInput" accept="image/*">
<button onclick="scanQR()">Escanear</button>
<div id="result"></div>
</div>

<!-- 📷 ESCÁNER EN VIVO -->
<div class="card">
<h2>📷 Escaneo en vivo</h2>

<video id="video" autoplay muted playsinline></video>

<button onclick="startCamera()">Iniciar cámara</button>
<button onclick="stopCamera()">Detener</button>

<div id="scanResult"></div>
</div>

</div>

<script src="https://unpkg.com/jsqr/dist/jsQR.js"></script>

<script>

// LOGIN
let DATA = [];

async function login(){
  const pin = document.getElementById("pin").value;

  const res = await fetch("/admin-login", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ pin })
  });

  const data = await res.json();

  if(!data.ok){
    alert("PIN incorrecto");
    return;
  }

  // 🔐 guardar token REAL
  localStorage.setItem("token", data.token);

  // 🔥 cargar admin data correctamente
  const r = await fetch("/admin-data", {
    headers:{
      "Authorization": data.token
    }
  });

  DATA = await r.json();

  document.getElementById("login").style.display="none";
  document.getElementById("dashboard").style.display="block";

  render();
}
// RENDER
function render(){
  const tbody = document.getElementById("tbody");
  tbody.innerHTML="";

  let total=0, aprobados=0, reprobados=0;
  const search = document.getElementById("search").value.toLowerCase();

  DATA.filter(u=>u.name.toLowerCase().includes(search))
  .forEach(u=>{
    total++;
    if(u.aprobado) aprobados++;
    else if(u.exam!==null) reprobados++;

    tbody.innerHTML += `
      <tr>
        <td>${u.name}</td>
        <td>${u.video}%</td>
        <td>${u.exam ?? "-"}</td>
        <td>${u.aprobado ? '<span class="badge ok">Aprobado</span>' : '<span class="badge fail">No</span>'}</td>
        <td>${u.qr ? `<img src="${u.qr}" class="qr">` : "-"}</td>
      </tr>
    `;
  });

  totalEl("total", total);
  totalEl("aprobados", aprobados);
  totalEl("reprobados", reprobados);
}

function totalEl(id,val){
  document.getElementById(id).innerText = val;
}

// QR POR IMAGEN
async function scanQR(){
  const file = document.getElementById("qrInput").files[0];
  if(!file) return alert("Selecciona imagen");

  const img = new Image();
  const reader = new FileReader();

  reader.onload = e => img.src = e.target.result;

  img.onload = async () => {
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img,0,0);

    const imageData = ctx.getImageData(0,0,canvas.width,canvas.height);
    const code = jsQR(imageData.data,canvas.width,canvas.height);

    if(!code) return renderResult(false);

    procesarQR(code.data, "result");
  };

  reader.readAsDataURL(file);
}

// CÁMARA
let stream, scanning=false;

async function startCamera(){
  try{
    const video = document.getElementById("video");

    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }
    });

    video.srcObject = stream;
    scanning=true;
    scanFrame();

  }catch(err){
    alert("No se pudo acceder a la cámara");
  }
}

function stopCamera(){
  scanning=false;
  if(stream) stream.getTracks().forEach(t=>t.stop());
}

function scanFrame(){
  if(!scanning) return;

  const video = document.getElementById("video");
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video,0,0);

  const img = ctx.getImageData(0,0,canvas.width,canvas.height);
  const code = jsQR(img.data,canvas.width,canvas.height);

  if(code){
    stopCamera();
    procesarQR(code.data, "scanResult");
    return;
  }

  requestAnimationFrame(scanFrame);
}

// VALIDAR QR
async function procesarQR(data, target){
  try{
    const url = new URL(data);
    const raw = url.searchParams.get("data");
    if(!raw) return renderResult(false, target);

    const decoded = JSON.parse(decodeURIComponent(raw));

    const res = await fetch("/validate-cert", {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization": localStorage.getItem("token")
      },
      body: JSON.stringify(decoded)
    });

    const r = await res.json();
    renderResult(r.ok, target, r);

  }catch(e){
    renderResult(false, target);
  }
}

function renderResult(ok, target="result", data={}){
  const div = document.getElementById(target);

  if(ok){
    div.innerHTML = `
      <h3 style="color:#22c55e;">✔ VÁLIDO</h3>
      <p>${data.user.nombre}</p>
    `;
  }else{
    div.innerHTML = `
      <h3 style="color:#ef4444;">✖ INVÁLIDO</h3>
    `;
  }
}

</script>

</body>
</html>
