<!DOCTYPE html>
<html>
<head>
<title>Admin TIA PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: 'Segoe UI', sans-serif;
  background:#f4f6f9;
  margin:0;
}

/* HEADER */
.header{
  background:white;
  padding:10px 15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #e5e7eb;
}

/* CONTENEDOR */
.container{
  padding:15px;
  display:grid;
  grid-template-columns: 2fr 1fr;
  gap:15px;
}

/* KPI COMPACTO */
.kpis{
  display:flex;
  gap:10px;
}

.kpi{
  flex:1;
  background:white;
  padding:10px;
  border-radius:8px;
  font-size:12px;
  text-align:center;
  box-shadow:0 2px 5px rgba(0,0,0,0.05);
}

.kpi b{
  font-size:16px;
}

/* TABLA */
.table{
  width:100%;
  background:white;
  border-radius:8px;
  font-size:13px;
}

.table th{
  background:#eef2f7;
}

.table td, .table th{
  padding:8px;
}

/* INPUT */
input{
  width:100%;
  padding:8px;
  border-radius:6px;
  border:1px solid #cbd5e1;
  margin:8px 0;
}

/* CARDS */
.card{
  background:white;
  padding:10px;
  border-radius:8px;
  font-size:13px;
  box-shadow:0 2px 5px rgba(0,0,0,0.05);
}

/* BOTONES */
button{
  padding:6px 10px;
  border:none;
  border-radius:6px;
  background:#3b82f6;
  color:white;
  cursor:pointer;
  font-size:12px;
}

/* BADGES */
.badge{
  padding:3px 8px;
  border-radius:12px;
  font-size:11px;
  color:white;
}

.ok{background:#22c55e;}
.fail{background:#ef4444;}

/* VIDEO */
video{
  width:100%;
  border-radius:8px;
}
</style>


</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
  <h2>🔐 Admin Login</h2>
  <input id="pin" placeholder="PIN">
  <button onclick="login()">Entrar</button>
</div>

<!-- DASHBOARD -->
<div class="header">
  <b>🛫 TIA PRO</b>
  <button onclick="logout()">Salir</button>
</div>

<div class="container">

  <!-- IZQUIERDA -->
  <div>

    <div class="kpis">
      <div class="kpi">Usuarios<br><b id="total">0</b></div>
      <div class="kpi">Aprobados<br><b id="aprobados">0</b></div>
      <div class="kpi">Reprobados<br><b id="reprobados">0</b></div>
    </div>

    <input id="search" placeholder="Buscar..." onkeyup="render()">

    <table class="table">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Video</th>
          <th>Examen</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>

  </div>

  <!-- DERECHA -->
  <div>

    <div class="card">
      <b>📂 Validar QR</b>
      <input type="file" id="qrInput">
      <button onclick="scanQR()">Escanear</button>
      <div id="result"></div>
    </div>

    <div class="card" style="margin-top:10px;">
      <b>📷 Escaneo</b>
      <video id="video" autoplay muted playsinline></video>
      <button onclick="startCamera()">Iniciar</button>
      <button onclick="stopCamera()">Detener</button>
      <div id="scanResult"></div>
    </div>

  </div>

</div>

<script src="https://unpkg.com/jsqr/dist/jsQR.js"></script>

<script>

let DATA = [];

async function login(){
  const pin = document.getElementById("pin").value;

  const res = await fetch("/admin-login", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ pin })
  });

  const data = await res.json();

  if(!data.ok){
    alert("PIN incorrecto");
    return;
  }

  localStorage.setItem("token", data.token);
  localStorage.setItem("adminName", data.name);

  initDashboard();
}

async function initDashboard(){
  const token = localStorage.getItem("token");

  if(!token) return;

  const res = await fetch("/admin-data", {
    headers:{ "Authorization": token }
  });

  DATA = await res.json();

  document.getElementById("login").style.display="none";
  document.getElementById("dashboard").style.display="block";

  document.getElementById("adminName").innerText = localStorage.getItem("adminName");

  render();
}

function logout(){
  localStorage.clear();
  location.reload();
}

function render(){
  const tbody = document.getElementById("tbody");
  tbody.innerHTML="";

  let total=0, aprobados=0, reprobados=0;
  const search = document.getElementById("search").value.toLowerCase();

  DATA.filter(u=>u.name.toLowerCase().includes(search))
  .forEach(u=>{
    total++;
    if(u.aprobado) aprobados++;
    else if(u.exam!==null) reprobados++;

    tbody.innerHTML += `
      <tr>
        <td>${u.name}</td>
        <td>${u.video}%</td>
        <td>${u.exam ?? "-"}</td>
        <td>${u.aprobado ? '<span class="badge ok">Aprobado</span>' : '<span class="badge fail">No</span>'}</td>
        <td>${u.qr ? `<img src="${u.qr}" width="40">` : "-"}</td>
      </tr>
    `;
  });

  document.getElementById("total").innerText = total;
  document.getElementById("aprobados").innerText = aprobados;
  document.getElementById("reprobados").innerText = reprobados;
}

// AUTO LOGIN
initDashboard();

</script>

</body>
</html>
