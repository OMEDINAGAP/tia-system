<!DOCTYPE html>
<html>
<head>
<title>Admin TIA PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
  font-family: Arial;
  background:#0b1220;
  color:white;
  padding:20px;
}

/* LOGIN */
.login{
  max-width:300px;
  margin:auto;
  margin-top:100px;
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  border:none;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}

/* DASHBOARD */
.dashboard{
  display:none;
}

.top{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:10px;
}

.kpis{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.kpi{
  flex:1;
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

.table{
  width:100%;
  border-collapse: collapse;
}

.table th{
  background:#334155;
}

.table td, .table th{
  padding:10px;
}

.badge{
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
}

.ok{background:#16a34a;}
.fail{background:#dc2626;}
.pending{background:#f59e0b;}

.qr{
  width:50px;
  cursor:pointer;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
  <h2>🔐 Admin Login</h2>
  <input id="pin" placeholder="PIN">
  <button onclick="login()">Entrar</button>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

<h1>🛫 Panel TIA PRO</h1>

<div class="kpis">
  <div class="kpi">Usuarios<br><b id="total">0</b></div>
  <div class="kpi">Aprobados<br><b id="aprobados">0</b></div>
  <div class="kpi">Reprobados<br><b id="reprobados">0</b></div>
</div>

<div class="top">
  <input id="search" placeholder="Buscar..." onkeyup="render()">
  <button onclick="exportExcel()">Exportar</button>
</div>

<table class="table">
<thead>
<tr>
<th>Nombre</th>
<th>Video</th>
<th>Examen</th>
<th>Intentos</th>
<th>Status</th>
<th>Certificado</th>
<th>QR</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>

<script>

let DATA = [];

async function login(){
  const pin = document.getElementById("pin").value;

  const res = await fetch(`/admin-data?pin=${pin}`);

  if(res.status !== 200){
    alert("PIN incorrecto");
    return;
  }

  DATA = await res.json();

  document.getElementById("login").style.display="none";
  document.getElementById("dashboard").style.display="block";

  render();
}

function render(){

  const tbody = document.getElementById("tbody");
  tbody.innerHTML="";

  let total=0, aprobados=0, reprobados=0;

  const search = document.getElementById("search").value.toLowerCase();

  DATA.filter(u=>u.name.toLowerCase().includes(search))
  .forEach(u=>{

    total++;

    if(u.aprobado) aprobados++;
    else if(u.exam!==null) reprobados++;

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${u.name}</td>
      <td>${u.video}%</td>
      <td>${u.exam ?? "-"}</td>
      <td>${u.intentos}</td>
      <td>${u.aprobado ? '<span class="badge ok">Aprobado</span>' : '<span class="badge fail">No</span>'}</td>
      <td>${u.folio ? `<button onclick="verCert('${u.id}')">Ver</button>` : "-"}</td>
      <td>${u.qr ? `<img src="${u.qr}" class="qr">` : "-"}</td>
    `;

    tbody.appendChild(tr);

  });

  document.getElementById("total").innerText = total;
  document.getElementById("aprobados").innerText = aprobados;
  document.getElementById("reprobados").innerText = reprobados;
}

function verCert(id){
  window.open(`/certificado.html?id=${id}`);
}

function exportExcel(){
  let csv="Nombre,Examen,Aprobado\n";
  DATA.forEach(u=>{
    csv+=`${u.name},${u.exam},${u.aprobado}\n`;
  });

  const blob = new Blob([csv]);
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href=url;
  a.download="reporte.csv";
  a.click();
}

</script>

</body>
</html>
