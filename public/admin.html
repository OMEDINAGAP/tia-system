<!DOCTYPE html>
<html>
<head>
<title>Admin TIA PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
  font-family: Arial;
  background:#0b1220;
  color:white;
  padding:20px;
}

/* LOGIN */
.login{
  max-width:300px;
  margin:auto;
  margin-top:100px;
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  border:none;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}

/* DASHBOARD */
.dashboard{
  display:none;
}

.top{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:10px;
}

.kpis{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.kpi{
  flex:1;
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

.table{
  width:100%;
  border-collapse: collapse;
}

.table th{
  background:#334155;
}

.table td, .table th{
  padding:10px;
}

.badge{
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
}

.ok{background:#16a34a;}
.fail{background:#dc2626;}
.pending{background:#f59e0b;}

.qr{
  width:50px;
  cursor:pointer;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
  <h2>🔐 Admin Login</h2>
  <input id="pin" placeholder="PIN">
  <button onclick="login()">Entrar</button>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

<h1>🛫 Panel TIA PRO</h1>

<div class="kpis">
  <div class="kpi">Usuarios<br><b id="total">0</b></div>
  <div class="kpi">Aprobados<br><b id="aprobados">0</b></div>
  <div class="kpi">Reprobados<br><b id="reprobados">0</b></div>
</div>

<div class="top">
  <input id="search" placeholder="Buscar..." onkeyup="render()">
  <button onclick="exportExcel()">Exportar</button>
</div>

<table class="table">
<thead>
<tr>
<th>Nombre</th>
<th>Video</th>
<th>Examen</th>
<th>Intentos</th>
<th>Status</th>
<th>Certificado</th>
<th>QR</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<h2>Validar QR</h2>

<input type="file" id="qrInput" accept="image/*">
<br><br>

<button onclick="scanQR()">Escanear</button>

<div id="result"></div>

</div>

<h2>Escaneo QR en vivo</h2>

<video id="video" width="300" style="border-radius:10px;"></video>

<br><br>

<button onclick="startCamera()">Iniciar cámara</button>
<button onclick="stopCamera()">Detener</button>

<div id="scanResult"></div>

<script>

let DATA = [];

async function login(){
  const pin = document.getElementById("pin").value;

  const res = await fetch(`/admin-data?pin=${pin}`);

  if(res.status !== 200){
    alert("PIN incorrecto");
    return;
  }

  DATA = await res.json();

  document.getElementById("login").style.display="none";
  document.getElementById("dashboard").style.display="block";

  render();
}

function render(){

  const tbody = document.getElementById("tbody");
  tbody.innerHTML="";

  let total=0, aprobados=0, reprobados=0;

  const search = document.getElementById("search").value.toLowerCase();

  DATA.filter(u=>u.name.toLowerCase().includes(search))
  .forEach(u=>{

    total++;

    if(u.aprobado) aprobados++;
    else if(u.exam!==null) reprobados++;

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${u.name}</td>
      <td>${u.video}%</td>
      <td>${u.exam ?? "-"}</td>
      <td>${u.intentos}</td>
      <td>${u.aprobado ? '<span class="badge ok">Aprobado</span>' : '<span class="badge fail">No</span>'}</td>
      <td>${u.folio ? `<button onclick="verCert('${u.id}')">Ver</button>` : "-"}</td>
      <td>${u.qr ? `<img src="${u.qr}" class="qr">` : "-"}</td>
    `;

    tbody.appendChild(tr);

  });

  document.getElementById("total").innerText = total;
  document.getElementById("aprobados").innerText = aprobados;
  document.getElementById("reprobados").innerText = reprobados;
}

function verCert(id){
  window.open(`/certificado.html?id=${id}`);
}

function exportExcel(){
  let csv="Nombre,Examen,Aprobado\n";
  DATA.forEach(u=>{
    csv+=`${u.name},${u.exam},${u.aprobado}\n`;
  });

  const blob = new Blob([csv]);
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href=url;
  a.download="reporte.csv";
  a.click();
}

</script>
<script src="https://unpkg.com/jsqr/dist/jsQR.js"></script>
<script>
  async function scanQR(){
  const file = document.getElementById("qrInput").files[0];

  if(!file){
    alert("Selecciona una imagen");
    return;
  }

  const img = new Image();
  const reader = new FileReader();

  reader.onload = function(e){
    img.src = e.target.result;
  };

  img.onload = async function(){
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;

    ctx.drawImage(img, 0, 0);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

    const code = jsQR(imageData.data, canvas.width, canvas.height);

    if(!code){
      document.getElementById("result").innerHTML = "❌ No se pudo leer el QR";
      return;
    }

    // 🔥 EXTRAER DATA DEL LINK
    const url = new URL(code.data);
    const raw = url.searchParams.get("data");

    if(!raw){
      document.getElementById("result").innerHTML = "❌ QR inválido";
      return;
    }

    const decoded = JSON.parse(decodeURIComponent(raw));

    // 🔐 VALIDAR CONTRA BACKEND
    const res = await fetch("/validate-cert", {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization": localStorage.getItem("token")
      },
      body: JSON.stringify(decoded)
    });

    const data = await res.json();

    if(data.ok){
      document.getElementById("result").innerHTML = `
        <h3 style="color:green;">✔ VÁLIDO</h3>
        <p><b>Nombre:</b> ${data.user.nombre}</p>
        <p><b>Folio:</b> ${data.user.folio}</p>
        <p><b>Resultado:</b> ${data.user.aprobado ? "APROBADO" : "NO APROBADO"}</p>
      `;
    }else{
      document.getElementById("result").innerHTML = `
        <h3 style="color:red;">✖ INVÁLIDO</h3>
        <p>${data.reason || ""}</p>
      `;
    }
  };

  reader.readAsDataURL(file);
}
</script>
<script>
  let stream;
let scanning = false;

async function startCamera(){
  const video = document.getElementById("video");

  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  });

  video.srcObject = stream;
  video.setAttribute("playsinline", true);
  video.play();

  scanning = true;
  scanFrame();
}

function stopCamera(){
  scanning = false;

  if(stream){
    stream.getTracks().forEach(track => track.stop());
  }
}

function scanFrame(){
  if(!scanning) return;

  const video = document.getElementById("video");
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

  const code = jsQR(imageData.data, canvas.width, canvas.height);

  if(code){
    scanning = false;
    stopCamera();
    procesarQR(code.data);
    return;
  }

  requestAnimationFrame(scanFrame);
}
</script>
<script>
  async function procesarQR(data){
  try{
    const url = new URL(data);
    const raw = url.searchParams.get("data");

    if(!raw){
      renderScan(false);
      return;
    }

    const decoded = JSON.parse(decodeURIComponent(raw));

    const res = await fetch("/validate-cert", {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization": localStorage.getItem("token")
      },
      body: JSON.stringify(decoded)
    });

    const result = await res.json();

    renderScan(result.ok, result.user, result.reason);

  }catch(e){
    console.error(e);
    renderScan(false);
  }
}

</script>
<script>
  function renderScan(ok, user, reason){
  const div = document.getElementById("scanResult");

  if(ok){
    div.innerHTML = `
      <h3 style="color:green;">✔ CERTIFICADO VÁLIDO</h3>
      <p><b>Nombre:</b> ${user.nombre}</p>
      <p><b>Folio:</b> ${user.folio}</p>
      <p><b>Resultado:</b> ${user.aprobado ? "APROBADO" : "NO APROBADO"}</p>
      <button onclick="startCamera()">Escanear otro</button>
    `;
  }else{
    div.innerHTML = `
      <h3 style="color:red;">✖ INVÁLIDO</h3>
      <p>${reason || "Error en validación"}</p>
      <button onclick="startCamera()">Intentar de nuevo</button>
    `;
  }
}
</script>
<script src="https://unpkg.com/jsqr/dist/jsQR.js"></script>
</body>
</html>
