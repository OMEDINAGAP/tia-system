<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>TIA Dashboard</title>
  <link rel="stylesheet" href="/css/admin.css">
</head>

<body>

  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <h2>✈️ TIA Dashboard</h2>
      <nav>
        <a class="active">Dashboard</a>
        <a>Usuarios</a>
        <a>Cursos</a>
        <a>Exámenes</a>
        <a>QR</a>
        <a>Logs</a>
      </nav>
    </aside>

    <!-- MAIN -->
    <main class="main">

      <!-- HEADER -->
      <header class="header">
        <h1>Centro de Control - Capacitación</h1>
        <div class="header-right">
          <span id="time"></span>
          <span class="status">🟢 Online</span>
        </div>
      </header>

      <!-- KPIs -->
      <section class="kpis">
        <div class="card">Usuarios <strong id="users">0</strong></div>
        <div class="card green">Completados <strong id="done">0</strong></div>
        <div class="card yellow">En progreso <strong id="progress">0</strong></div>
        <div class="card red">Reprobados <strong id="fail">0</strong></div>
      </section>

      <!-- PROGRESO GLOBAL -->
      <section class="global-progress">
        <h3>Progreso general</h3>
        <div class="bar">
          <div id="bar-fill"></div>
        </div>
        <span id="bar-text">0%</span>
      </section>

      <!-- TABLA -->
      <section class="table-section">
        <input type="text" placeholder="Buscar..." id="search">

        <table>
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Folio</th>
              <th>Progreso</th>
              <th>Último video</th>
              <th>Minuto</th>
              <th>Estado</th>
            </tr>
          </thead>
          <tbody id="table"></tbody>
        </table>
      </section>

      <!-- ALERTAS -->
      <section class="alerts">
        <h3>Alertas</h3>
        <ul id="alerts"></ul>
      </section>

      <!-- ACTIVIDAD -->
      <section class="activity">
        <h3>Actividad en tiempo real</h3>
        <ul id="activity"></ul>
      </section>

    </main>

  </div>

  <script src="/js/admin.js"></script>
</body>

</html>
